<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Koneksi Error</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 20px 24px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #111;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
        }
        .icon-container {
            position: relative;
            margin-bottom: 40px;
        }
        .shadow {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 10px;
            background: #fde8e7;
            border-radius: 50%;
            z-index: 1;
        }
        .icon {
            position: relative;
            z-index: 2;
            width: 140px;
            height: 140px;
        }
        h1 {
            color: #111;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .footer {
            padding: 24px;
        }
        .btn {
            background: #d64d43;
            color: white;
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
        }
        .btn:hover {
            background: #b83c34;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.5 15L1.5 8L8.5 1" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
        </button>
    </div>
    
    <div class="content">
        <div class="icon-container">
            <div class="shadow"></div>
            <svg class="icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M45.6699 17.5C47.5944 14.1667 52.4056 14.1667 54.3301 17.5L88.9711 77.5C90.8956 80.8333 88.4901 85 84.641 85H15.359C11.5099 85 9.10444 80.8333 11.0289 77.5L45.6699 17.5Z" stroke="#d64d43" stroke-width="3" stroke-linejoin="round" fill="#fff"/>
                <path d="M50 38V58" stroke="#d64d43" stroke-width="4.5" stroke-linecap="round"/>
                <circle cx="50" cy="70" r="3" fill="#d64d43"/>
            </svg>
        </div>

        <h1>Aplikasi Memerlukan Koneksi Internet</h1>
        <p>Silahkan Periksa Koneksi Anda dan coba lagi.</p>
    </div>
    
    <div class="footer">
        <button class="btn" onclick="location.reload()">Reload</button>
    </div>
</body>
</html>
