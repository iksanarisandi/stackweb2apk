<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Koneksi Error</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(214, 77, 67, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(214, 77, 67, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px 24px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #111;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .back-btn:hover {
            background-color: #f5f5f5;
        }

        .back-btn:active {
            background-color: #ebebeb;
            transform: scale(0.98);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
            position: relative;
            z-index: 1;
        }

        .icon-container {
            position: relative;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .shadow {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 10px;
            background: #fde8e7;
            border-radius: 50%;
            z-index: 1;
            animation: shadow-pulse 3s ease-in-out infinite;
        }

        @keyframes shadow-pulse {
            0%, 100% { opacity: 1; width: 80px; }
            50% { opacity: 0.6; width: 60px; }
        }

        .icon {
            position: relative;
            z-index: 2;
            width: 140px;
            height: 140px;
        }

        /* Pulse ring animation */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid rgba(214, 77, 67, 0.15);
            z-index: 0;
            animation: pulse-ring 2s ease-out infinite;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 1s;
        }

        @keyframes pulse-ring {
            0% { width: 140px; height: 140px; opacity: 1; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }

        h1 {
            color: #111;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .tips {
            margin-top: 8px;
            padding: 16px 20px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: left;
            width: 100%;
            max-width: 320px;
        }

        .tips-title {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        .tip-item:last-child {
            margin-bottom: 0;
        }

        .tip-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fde8e7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }

        .footer {
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .btn {
            background: #d64d43;
            color: white;
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #b83c34;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(214, 77, 67, 0.3);
        }

        .btn:active {
            background: #a33229;
            transform: translateY(0);
            box-shadow: none;
        }

        .btn.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Auto-retry countdown */
        .countdown {
            font-size: 13px;
            color: #999;
            margin-top: 12px;
            display: none;
        }

        .countdown.visible {
            display: block;
        }

        .countdown span {
            color: #d64d43;
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media (max-height: 600px) {
            .icon-container {
                margin-bottom: 20px;
            }
            .icon {
                width: 100px;
                height: 100px;
            }
            h1 {
                font-size: 20px;
                margin-bottom: 10px;
            }
            .tips {
                display: none;
            }
        }

        @media (max-width: 320px) {
            .content {
                padding: 0 24px;
            }
            h1 {
                font-size: 20px;
            }
            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.5 15L1.5 8L8.5 1" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
        </button>
    </div>

    <div class="content">
        <div class="icon-container">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="shadow"></div>
            <svg class="icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- WiFi signal broken icon -->
                <path d="M50 15C30 15 13 28 8 46" stroke="#d64d43" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
                <path d="M50 15C63 15 74 22 80 33" stroke="#d64d43" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
                <circle cx="50" cy="28" r="4" fill="#d64d43" opacity="0.3"/>

                <!-- Main warning triangle -->
                <path d="M45.6699 37.5C47.5944 34.1667 52.4056 34.1667 54.3301 37.5L78.9711 80C80.8956 83.3333 78.4901 87.5 74.641 87.5H25.359C21.5099 87.5 19.1044 83.3333 21.0289 80L45.6699 37.5Z" stroke="#d64d43" stroke-width="3" stroke-linejoin="round" fill="#fff"/>
                <path d="M50 52V67" stroke="#d64d43" stroke-width="4.5" stroke-linecap="round"/>
                <circle cx="50" cy="77" r="3" fill="#d64d43"/>

                <!-- X marks on broken signal -->
                <line x1="5" y1="25" x2="15" y2="35" stroke="#d64d43" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
                <line x1="15" y1="25" x2="5" y2="35" stroke="#d64d43" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
            </svg>
        </div>

        <h1>Aplikasi Memerlukan<br>Koneksi Internet</h1>
        <p>Silahkan periksa koneksi Anda dan coba lagi.</p>

        <div class="tips">
            <div class="tips-title">Tips Troubleshooting</div>
            <div class="tip-item">
                <div class="tip-icon">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M6 1v4M6 7v1" stroke="#d64d43" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                Pastikan Wi-Fi atau data seluler aktif
            </div>
            <div class="tip-item">
                <div class="tip-icon">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M6 1v4M6 7v1" stroke="#d64d43" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                Coba matikan dan nyalakan kembali jaringan
            </div>
            <div class="tip-item">
                <div class="tip-icon">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M6 1v4M6 7v1" stroke="#d64d43" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                Restart aplikasi jika masalah berlanjut
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="btn" id="reloadBtn" onclick="handleReload()">
            <div class="spinner"></div>
            <span class="btn-text">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align: middle;">
                    <path d="M13.5 8a5.5 5.5 0 1 1-1.2-3.4" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M13.5 2v3h-3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Coba Lagi
            </span>
        </button>
        <div class="countdown" id="countdown">
            Auto retry dalam <span id="timer">15</span> detik
        </div>
    </div>

    <script>
        // Auto-retry with countdown
        var retrySeconds = 15;
        var countdownEl = document.getElementById('countdown');
        var timerEl = document.getElementById('timer');
        var btn = document.getElementById('reloadBtn');
        var interval;

        function startCountdown() {
            var seconds = retrySeconds;
            countdownEl.classList.add('visible');
            timerEl.textContent = seconds;

            interval = setInterval(function() {
                seconds--;
                timerEl.textContent = seconds;

                if (seconds <= 0) {
                    clearInterval(interval);
                    handleReload();
                }
            }, 1000);
        }

        function handleReload() {
            clearInterval(interval);
            btn.classList.add('loading');
            countdownEl.classList.remove('visible');

            // Small delay for UX feedback
            setTimeout(function() {
                location.reload();
            }, 500);
        }

        // Start auto-retry countdown on page load
        startCountdown();

        // Pause countdown when page loses visibility
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                clearInterval(interval);
            } else {
                startCountdown();
            }
        });
    </script>
</body>
</html>
